config harmony-node 'main'
	option enabled '1'
	option identity_file '/etc/harmony/identity.key'
	option listen_address '0.0.0.0:4242'
	option cache_capacity '256'
	option compute_budget '100000'
	option filter_broadcast_ticks '30'
	option filter_mutation_threshold '100'
	option encrypted_durable_persist '0'
	option encrypted_durable_announce '0'
	option no_public_ephemeral_announce '0'
	option no_mdns '0'
	option mdns_stale_timeout '60'
	# Persistent storage: auto-detects USB partition labeled HARMONY.
	# Override to use a specific path (e.g. '/mnt/sda1/harmony').
	# Leave empty for auto-detection, set 'none' to force volatile-only.
	# option storage_path ''
	# option relay_url 'https://relay.example.com'
	# list tunnel_peer '<node_id_hex>'

config mesh 'mesh'
	# Radio override for the HARMONY-MESH interface.
	# Empty = auto-detect first 5GHz radio (recommended).
	# Set to 'radio0', 'radio1', etc. to force a specific radio.
	option radio ''
